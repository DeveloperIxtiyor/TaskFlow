<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Vazifalar</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Momo+Signature&family=Syne:wght@400..800&display=swap');

        .momo-signature-regular { font-family: "Momo Signature", cursive; }
        .syne-uniquifier { font-family: "Syne", sans-serif; }

        .gradient-border {
            border: 2px solid transparent;
            background-clip: padding-box, border-box;
            background-origin: border-box;
            background-image: linear-gradient(#1e293b, #1e293b), linear-gradient(to right, #ec4899, #8b5cf6);
        }

        .gradient-border:hover {
            transition: all 0.3s ease-in-out;
            box-shadow: 0 0 20px rgba(236,72,153,0.3);
        }
    </style>
</head>

<body class="bg-slate-900 min-h-screen text-white">

<!-- HEADER -->
<header class="h-24 w-full bg-slate-800 flex items-center justify-between px-4 sm:px-6 md:px-24">
    
    <div class="momo-signature-regular bg-gradient-to-r from-pink-500 to-violet-500 bg-clip-text text-3xl sm:text-4xl md:text-5xl font-extrabold text-transparent">
        TaskFlow
    </div>

    <div class="flex items-center gap-4 sm:gap-6">
        <span class="text-slate-300 text-sm sm:text-base">
            Salom, <strong id="nav-username">...</strong>
        </span>

        <a href="./index.html"
           class="px-3 sm:px-5 py-2 rounded-xl border border-red-500/50 text-red-500 hover:bg-red-500 hover:text-white transition-all duration-500 text-sm">
            Chiqish
        </a>
    </div>

</header>

<!-- MAIN -->
<main class="px-4 sm:px-6 md:px-24 pb-20 max-w-7xl mx-auto">

    <!-- TITLE -->
    <h1 class="syne-uniquifier text-2xl sm:text-3xl md:text-4xl font-extrabold pt-12">
        Vazifalarim
    </h1>

    <p class="text-sm sm:text-lg md:text-xl font-thin pt-2 text-slate-400">
        Juma, 27 Mart 2026
    </p>

    <!-- STATS -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 mt-12">

        <div class="h-32 flex flex-col items-center justify-center rounded-xl gradient-border">
            <span id="total" class="text-2xl md:text-3xl font-bold text-pink-500">0</span>
            <span class="text-slate-400">Jami</span>
        </div>

        <div class="h-32 flex flex-col items-center justify-center rounded-xl gradient-border">
            <span id="done" class="text-2xl md:text-3xl font-bold text-violet-500">0</span>
            <span class="text-slate-400">Bajarildi</span>
        </div>

        <div class="h-32 flex flex-col items-center justify-center rounded-xl gradient-border">
            <span id="left" class="text-2xl md:text-3xl font-bold text-blue-500">0</span>
            <span class="text-slate-400">Qoldi</span>
        </div>

    </div>

    <!-- ADD TASK -->
    <div class="w-full mt-12 rounded-2xl gradient-border flex flex-col justify-center px-4 md:px-8 py-6">

        <div class="text-slate-300 text-lg mb-3 font-medium">
            + YANGI VAZIFA
        </div>

        <div class="grid grid-cols-1 md:grid-cols-6 gap-4">

            <input id="title" placeholder="Vazifa nomi"
                class="pl-4 md:col-span-2 rounded-lg bg-slate-900/50 border border-slate-700 focus:border-pink-500 outline-none h-12">

            <input id="desc" placeholder="Vazifa ta'rifi"
                class="pl-4 md:col-span-3 rounded-lg bg-slate-900/50 border border-slate-700 focus:border-violet-500 outline-none h-12">

            <button id="addBtn"
                class="md:col-span-1 h-12 bg-gradient-to-r from-pink-500 to-violet-500 rounded-lg text-white font-bold active:scale-95">
                Qo'shish
            </button>

        </div>

    </div>

    <!-- FILTERS -->
    <h1 class="syne-uniquifier text-2xl sm:text-3xl md:text-4xl font-extrabold mt-16 bg-gradient-to-r from-pink-500 to-violet-500 bg-clip-text text-transparent w-fit">
        Filtrlar
    </h1>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 mt-8">

        <button id="allBtn" class="h-20 flex items-center justify-center gap-3 rounded-xl gradient-border">
            <span class="text-slate-300">Hammasi</span>
            <span id="allCount" class="text-lg md:text-xl text-pink-500">0</span>
        </button>

        <button id="doneBtn" class="h-20 flex items-center justify-center gap-3 rounded-xl gradient-border">
            <span class="text-slate-300">Bajarilganlar</span>
            <span id="doneCount" class="text-lg md:text-xl text-violet-500">0</span>
        </button>

        <button id="pendingBtn" class="h-20 flex items-center justify-center gap-3 rounded-xl gradient-border">
            <span class="text-slate-300">Kutilayotganlar</span>
            <span id="pendingCount" class="text-lg md:text-xl text-blue-500">0</span>
        </button>

    </div>

    <!-- TASKS -->
    <div id="tasks" class="mt-10 space-y-4"></div>

</main>

<script src="dist/app.js"></script>

</body>
</html>
